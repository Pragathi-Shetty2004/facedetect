version: "3.9"

# Development overrides – run with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  db:
    ports:
      - "5432:5432"    # expose for local tooling / migrations

  backend:
    build:
      target: builder  # include dev deps
    volumes:
      - ./backend:/app  # live code mount
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app
    environment:
      APP_ENV: development
    ports:
      - "8000:8000"    # direct access for curl / Postman

  frontend:
    build: {}          # still uses nginx build
    ports:
      - "80:80"
